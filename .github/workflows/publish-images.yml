name: Publish Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional image tag (default: sha-<short commit>)"
        required: false

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: migrate
            dockerfile: infra/docker/Dockerfile.migrate
            build_args: ""
          - service: api
            dockerfile: infra/docker/Dockerfile.service
            build_args: "SERVICE=api"
          - service: gateway
            dockerfile: infra/docker/Dockerfile.service
            build_args: "SERVICE=gateway"
          - service: engine
            dockerfile: infra/docker/Dockerfile.service
            build_args: "SERVICE=engine"
          - service: scoring
            dockerfile: infra/docker/Dockerfile.service
            build_args: "SERVICE=scoring"
          - service: web
            dockerfile: infra/docker/Dockerfile.web
            build_args: "NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost' }}"
    steps:
      - uses: actions/checkout@v4

      - name: Resolve registry and tag
        id: meta
        env:
          ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
        run: |
          if [[ -n "$ACR_LOGIN_SERVER" ]]; then
            REGISTRY="$ACR_LOGIN_SERVER"
          else
            REGISTRY="ghcr.io/${{ github.repository_owner }}"
          fi
          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="sha-$(git rev-parse --short HEAD)"
          fi
          echo "registry=$REGISTRY" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Publishing to $REGISTRY/quanta-*:$TAG"

      - name: Log in to Azure Container Registry
        if: vars.ACR_LOGIN_SERVER != ''
        uses: azure/docker-login@v2
        with:
          login-server: ${{ vars.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Log in to GitHub Container Registry
        if: vars.ACR_LOGIN_SERVER == ''
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.meta.outputs.registry }}/quanta-${{ matrix.service }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.registry }}/quanta-${{ matrix.service }}:latest
          build-args: |
            ${{ matrix.build_args }}
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost' }}
            NEXT_PUBLIC_WS_URL=${{ vars.NEXT_PUBLIC_WS_URL || 'ws://localhost' }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Summary
        run: |
          echo "Published \`${{ steps.meta.outputs.registry }}/quanta-${{ matrix.service }}:${{ steps.meta.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
