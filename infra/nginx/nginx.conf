worker_processes auto;

events {
  worker_connections 4096;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
  }

  upstream web {
    server web:3000;
  }

  upstream api {
    server api:8000;
  }

  upstream gateway {
    server gateway:8080;
  }

  include /etc/nginx/conf.d/*.conf;
}
