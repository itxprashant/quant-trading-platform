# Production stack for a single VM (demo / small events).
# Usage: docker compose -f docker-compose.prod.yml up -d --build

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-qtp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-qtp}
    volumes:
      - qtp-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-qtp}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [internal]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - qtp-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [internal]

  migrate:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.migrate
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-qtp}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-qtp}
    depends_on:
      postgres:
        condition: service_healthy
    networks: [internal]
    restart: "no"

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE: api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_PORT: "8000"
      DATABASE_URL: postgresql://${POSTGRES_USER:-qtp}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-qtp}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-86400}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks: [internal]

  gateway:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE: gateway
    restart: unless-stopped
    command: ["node", "dist/index.js"]
    environment:
      NODE_ENV: production
      GATEWAY_PORT: "8080"
      DATABASE_URL: postgresql://${POSTGRES_USER:-qtp}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-qtp}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks: [internal]

  engine:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE: engine
    restart: unless-stopped
    command: ["node", "dist/index.js"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-qtp}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-qtp}
      REDIS_URL: redis://redis:6379
      ENGINE_TICK_MS: ${ENGINE_TICK_MS:-1000}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks: [internal]

  scoring:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE: scoring
    restart: unless-stopped
    command: ["node", "dist/index.js"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-qtp}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-qtp}
      REDIS_URL: redis://redis:6379
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks: [internal]

  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?set NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:?set NEXT_PUBLIC_WS_URL}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
    depends_on:
      - api
    networks: [internal]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      - web
      - api
      - gateway
    networks: [internal]

  certbot:
    image: certbot/certbot:v3.0.1
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    networks: [internal]

networks:
  internal:
    driver: bridge

volumes:
  qtp-pgdata:
  qtp-redisdata:
  certbot-www:
  certbot-certs:
